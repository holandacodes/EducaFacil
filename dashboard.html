<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>
<body>

<header>

    <div class="logo">
        Educa<span>Fácil</span>
    </div>

    <nav>

        <a href="index.html">Início</a>
        <a href="materias.html">Matérias</a>
        <a href="quiz.html">Quiz</a>
        <a href="sobre.html">Sobre</a>

    </nav>

    <button id="toggleTheme">
        🌙
    </button>

</header>

<section class="dashboard">

    <h1>
        Dashboard do Aluno
    </h1>

    <div class="dashboard-cards">

        <!-- CARD -->

        <div class="dashboard-card">

            <i class="fa-solid fa-trophy"></i>

            <h2>
                Pontuação
            </h2>

            <p id="score">
                0
            </p>

        </div>

        <!-- CARD -->

        <div class="dashboard-card">

            <i class="fa-solid fa-chart-line"></i>

            <h2>
                Progresso
            </h2>

            <p id="progressText">
                0%
            </p>

            <div class="mini-progress">

                <div id="miniBar"></div>

            </div>

        </div>

        <!-- CARD -->

        <div class="dashboard-card">

            <i class="fa-solid fa-fire"></i>

            <h2>
                Desafio do Dia
            </h2>

            <p>

                Criar uma página usando HTML e CSS.

            </p>

        </div>

    </div>

</section>

<script>

const pontos =
localStorage.getItem("pontuacao");

const progresso =
localStorage.getItem("progresso");

document.getElementById("score")
.innerText = pontos || 0;

document.getElementById("progressText")
.innerText = `${Math.floor(progresso || 0)}%`;

document.getElementById("miniBar")
.style.width =
`${Math.floor(progresso || 0)}%`;

</script>

<script src="theme.js"></script>

</body>
</html>
